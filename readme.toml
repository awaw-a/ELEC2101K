[[sections]]
title = "学习建议"

[[sections.items]]
content = "- C++国内外差异不大，**看B站教程**也可作为有效的学习途径。不过要知道各种中文词对应的英文，**否则考试会看不懂题目**。"
author = { name = "awaw_a", link = "https://github.com/awaw-a", date = "2026-07" }

[[sections]]
title = "考核方式"

[[sections.items]]
content = """
- 平时成绩: 40%    
  - 包含理论课课堂题目成绩与实验课实验报告成绩。
- 期中考试: 10%
  - 随堂测试，26年为手写试卷，包含选择题与编程题。
- 期末考试: 50%    
  - 题型：
    - **选择题** 选择题极其变态，你大概率看不懂全英文的题干和选项。
    - **简答题** 简答题即给你代码，你回答输出结果以及为什么输出这个结果，个人认为是试卷中最好拿分的部分。
    - **编程题** 编程题即给你一个题目，你根据题目要求手写补全代码。
  - 考察范围
    - 26春期末仅考察期中以后部分的内容。
"""
author = { name = "awaw_a", link = "https://github.com/awaw-a", date = "2026-07" }

